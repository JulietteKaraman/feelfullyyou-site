<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Taster · Intimacy &amp; Communication Cards</title>
<meta name="description" content="10 free cards from the Intimacy and Communication deck. Enter your email and go straight in.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;0,700;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#fefcfa;
    --ink:#1c1714;
    --brown:#5d4a33;
    --gold:#a88538;
    --gold-deep:#99680c;
    --gold-soft:#b4a074;
    --teal:#0d3535;
    --teal-deep:#061a1a;
    --line:#e3dccf;
    --display:'Poppins',system-ui,sans-serif;
    --body:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--cream);color:var(--brown);font-family:var(--body);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}

  /* TOPBAR */
  .topbar{background:var(--teal);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .topbar .brand{font-family:var(--display);font-weight:700;font-size:15px;color:#fff;letter-spacing:.02em}
  .topbar .brand b{color:#ddc98e}

  /* MAIN — centred single column */
  .main{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 28px}
  .card{max-width:520px;width:100%;text-align:center}

  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold-deep);font-weight:700;margin-bottom:20px}
  h1{font-family:var(--display);font-size:clamp(2rem,5vw,3rem);font-weight:700;color:var(--teal);line-height:1.07;letter-spacing:-.022em;margin-bottom:16px}
  h1 em{font-style:italic;color:var(--gold)}
  .sub{font-size:1.05rem;color:var(--brown);line-height:1.7;margin-bottom:40px}

  .form-label{font-family:var(--display);font-size:1.1rem;font-weight:600;color:var(--teal);margin-bottom:14px}
  form{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  input[type="email"]{flex:1;min-width:220px;max-width:300px;padding:14px 18px;font-size:1rem;font-family:var(--body);border:1.5px solid var(--line);border-radius:2px;background:#fff;color:var(--ink);outline:none;transition:border-color .2s}
  input[type="email"]::placeholder{color:var(--gold-soft)}
  input[type="email"]:focus{border-color:var(--teal)}
  button{padding:14px 28px;background:var(--teal);color:#fff;font-family:var(--body);font-size:1rem;font-weight:700;border:none;border-radius:2px;cursor:pointer;transition:background .2s;white-space:nowrap}
  button:hover{background:var(--teal-deep)}
  button:disabled{opacity:.65;cursor:not-allowed}
  .fine{font-size:12px;color:var(--gold-soft);margin-top:12px}

  footer{padding:22px 28px;text-align:center;font-size:12px;color:var(--gold-soft);flex-shrink:0}
  footer a{color:inherit;text-decoration:underline;text-underline-offset:3px}
</style>
</head>
<body>

<div class="topbar">
  <a href="/" class="brand">Feel Fully <b>You</b></a>
</div>

<main class="main">
  <div class="card">
    <div class="eyebrow">FREE TASTER · INTIMACY &amp; COMMUNICATION CARDS</div>
    <h1>Pick a card. Ask the question. <em>Notice what happens.</em></h1>
    <p class="sub">10 cards from the 475-card deck. Free. Straight to you.</p>

    <p class="form-label">Where do we send the taster deck?</p>
    <form id="signupForm">
      <input type="email" id="emailInput" name="email" placeholder="Your email address" required autocomplete="email">
      <button type="submit" id="submitBtn">Send it to me</button>
    </form>
    <p class="fine">No spam. Unsubscribe any time.</p>
  </div>
</main>

<footer>
  <a href="/cards">See the full deck</a> &nbsp;·&nbsp; <a href="mailto:support@feelfullyyou.com">support@feelfullyyou.com</a>
</footer>

<script>
  const REDIRECT_URL = 'https://couplecards.netlify.app/free';

  document.getElementById('signupForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = document.getElementById('emailInput').value.trim();
    const btn   = document.getElementById('submitBtn');

    btn.disabled = true;
    btn.textContent = 'On its way…';

    fetch('/.netlify/functions/subscribe', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, tag: 'free-cards-taster'})
    }).catch(() => {});

    await new Promise(r => setTimeout(r, 600));
    window.location.href = REDIRECT_URL;
  });
</script>
</body>
</html>
