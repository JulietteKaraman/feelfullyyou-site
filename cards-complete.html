<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex">
<title>One moment</title>
<script>
  var offer = new URLSearchParams(window.location.search).get('offer');
  if (offer === '40') { window.location.replace('/cards-complete-tr'); }
  else if (offer === '20') { window.location.replace('/cards-complete-deck'); }
  else { window.location.replace('/cards'); }
</script>
<link rel="icon" href="/favicon.ico" sizes="48x48">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-SY8NKELMNZ"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-SY8NKELMNZ');
</script>
</head>
<body><script>
document.addEventListener('click', function(e){
  var a = e.target.closest('a'); if(!a || typeof gtag !== 'function') return;
  var h = a.href || '';
  var label = (a.textContent || '').trim().slice(0, 60);
  if (h.indexOf('stripe.com') > -1) gtag('event', 'begin_checkout', {link_url: h, link_text: label, page_path: location.pathname});
  else if (h.indexOf('tidycal.com') > -1) gtag('event', 'book_call_click', {link_url: h, link_text: label, page_path: location.pathname});
  else if (h.indexOf('instagram.com') > -1) gtag('event', 'instagram_click', {link_url: h, page_path: location.pathname});
  else if (h.indexOf('/files/') > -1 || h.indexOf('.pdf') > -1) gtag('event', 'freebie_download', {link_url: h, page_path: location.pathname});
});
</script>
</body>
</html>
