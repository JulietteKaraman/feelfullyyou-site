<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>You have it · Feel Fully You</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#fefcfa;--ink:#1c1714;--brown:#5d4a33;
    --gold:#a88538;--gold-deep:#99680c;--gold-pale:#ddc98e;--gold-soft:#b4a074;
    --teal:#0d3535;
    --blue:#d8dfe1;--teal-deep:#061a1a;--line-dark:#1d3a39;
    --display:'Poppins',system-ui,sans-serif;--body:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--cream);color:var(--brown);font-family:var(--body);font-size:17px;line-height:1.65;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}

  .topbar{position:fixed;top:0;left:0;right:0;z-index:9999;background:var(--teal);padding:0 28px;height:64px;display:flex;align-items:center;justify-content:space-between}
  .topbar .brand{font-family:var(--display);font-weight:700;font-size:16px;letter-spacing:.02em;color:var(--cream)}
  .topbar .brand b{color:var(--gold-pale)}
  .topbar nav{display:flex;gap:26px;align-items:center}
  .topbar nav a{font-size:14px;color:var(--cream);font-weight:500;transition:color .2s}
  .topbar nav a:hover{color:var(--gold-pale)}
  .topbar nav a.btn{background:var(--gold);color:#fff;padding:10px 20px;border-radius:2px;font-weight:600}
  .topbar nav a.btn:hover{background:var(--gold-deep)}
  @media(max-width:860px){.topbar nav > a:not(.btn){display:none}}

  .hero{padding:80px 28px 56px;text-align:center;max-width:640px;margin:0 auto}
  .check{width:56px;height:56px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
  .check svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
  .eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-deep);font-weight:600;margin-bottom:16px}
  h1{font-family:var(--display);font-weight:700;font-size:clamp(1.8rem,4.5vw,2.8rem);color:var(--ink);line-height:1.06;letter-spacing:-.022em;margin-bottom:16px}
  .hero-sub{font-size:18px;color:var(--brown);max-width:46ch;margin:0 auto;line-height:1.6}

  .body{max-width:560px;margin:0 auto;padding:8px 28px 64px}
  .body p{font-size:16px;color:var(--brown);line-height:1.72;margin-bottom:16px;margin-top:32px;text-align:center}

  .next{max-width:480px;margin:0 auto 64px;padding:0 28px;display:flex;flex-direction:column;gap:14px;align-items:center}
  .next-btn{display:block;text-align:center;border:1.5px solid var(--teal);color:var(--teal);font-family:var(--body);font-weight:600;font-size:15px;padding:14px 28px;border-radius:2px;letter-spacing:.03em;text-transform:uppercase;transition:background .2s,color .2s;width:100%;max-width:360px}
  .next-btn:hover{background:var(--teal);color:#fff}
  .next-btn.gold{background:var(--gold);border-color:var(--gold);color:#fff}
  .next-btn.gold:hover{background:var(--gold-deep);border-color:var(--gold-deep)}

  footer{background:#a88538;color:#fff;padding:22px 32px;font-size:13px}
  footer .inner{max-width:1140px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
  footer .brand{font-family:var(--display);font-weight:700;font-size:.95rem;color:#fff}
  footer a{color:rgba(255,255,255,.75)}
  footer a.email{color:#fff;text-decoration:underline;text-underline-offset:3px;text-decoration-color:rgba(255,255,255,.5)}

  /* MOBILE NAV */
  .ham{display:none;background:none;border:none;cursor:pointer;padding:6px;color:var(--cream)}
  .ham svg{display:block}
  .mobile-nav{display:none;position:fixed;top:64px;left:0;right:0;background:var(--teal);z-index:9998;padding:16px 0;border-top:1px solid rgba(255,255,255,.1);flex-direction:column}
  .mobile-nav a{display:block;padding:13px 28px;font-size:15px;color:var(--cream);font-weight:500;font-family:var(--body);text-decoration:none;border-bottom:1px solid rgba(255,255,255,.07)}
  .mobile-nav a:last-child{border-bottom:none}
  .mobile-nav a.btn{margin:14px 28px 6px;display:block;background:var(--gold);color:#fff;padding:12px 20px;border-radius:2px;font-weight:600;text-align:center;border:none}
  .mobile-nav.open{display:flex}
  @media(max-width:860px){.ham{display:block}.topbar .more-wrap{display:none}.topbar nav > .btn{display:none}}
</style>
<link rel="icon" href="/favicon.ico" sizes="48x48">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-SY8NKELMNZ"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-SY8NKELMNZ');
</script>
</head>
<body>

<div class="topbar">
  <a href="/" class="brand">Feel Fully <b>You</b></a>
</div>


<nav class="mobile-nav" id="mobileNav">
  <a href="/">Home</a>
</nav>

<div class="hero">
  <div class="check">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <div class="eyebrow">You have it</div>
  <h1>The anchor is yours.</h1>
  <p class="hero-sub">Two minutes, any time, anywhere. You already have everything you need.</p>
</div>

<div class="body">
  <p>When you are ready for more, here is where to go next.</p>
</div>

<div class="next">
  <a href="/free-resources" class="next-btn">Explore all free resources</a>
  <a href="/work-with-me" class="next-btn gold">Work with Juliette</a>
</div>

<footer>
  <div class="inner">
    <div class="brand">Feel Fully You
  <button class="ham" id="hamBtn" aria-label="Open menu" aria-expanded="false">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
</div>
    <div style="font-size:12px;color:rgba(255,255,255,.85);display:flex;gap:16px;align-items:center">
      <a href="mailto:support@feelfullyyou.com" class="email">support@feelfullyyou.com</a>
      <a href="/terms">Terms</a><a href="/privacy">Privacy</a>
    </div>
  </div>
</footer>

<script>
(function(){
  var btn=document.getElementById('hamBtn');
  var nav=document.getElementById('mobileNav');
  if(btn&&nav){btn.addEventListener('click',function(){nav.classList.toggle('open');btn.setAttribute('aria-expanded',nav.classList.contains('open'))});}
})();
</script>
</body>
</html>
