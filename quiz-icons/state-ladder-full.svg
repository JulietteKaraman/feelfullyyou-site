<svg viewBox="0 0 640 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fefcfa; }
      .frame { fill: none; stroke: #A88538; stroke-width: 2; }
      .rail { stroke: #0D3535; stroke-width: 3; fill: none; }
      .rung { stroke: #0D3535; stroke-width: 3; }
      .rung-glow { stroke: #A88538; stroke-width: 6; opacity: 0.35; }
      .dot { fill: #fefcfa; stroke: #0D3535; stroke-width: 3; }
      .dot-home { fill: #A88538; stroke: #A88538; }
      .label { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 700; font-size: 27px; letter-spacing: 3px; fill: #0D3535; }
      .label-home { fill: #A88538; }
      .desc { font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-size: 19px; fill: #6b6b66; }
      .kicker { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 600; font-size: 15px; letter-spacing: 5px; fill: #A88538; text-transform: uppercase; }
      .tri { fill: none; stroke: #A88538; stroke-width: 2.5; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="640" height="900"/>
  <rect class="frame" x="16" y="16" width="608" height="868"/>

  <text class="kicker" x="320" y="70" text-anchor="middle">THE TOUCH LANGUAGES SYSTEM</text>
  <text x="320" y="106" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#0D3535" font-style="italic">The State Ladder</text>

  <!-- Ladder rails -->
  <path class="rail" d="M 150 760 L 150 190"/>
  <path class="rail" d="M 190 760 L 190 190"/>

  <!-- Ascending arrow along the rails -->
  <path d="M 170 175 L 158 200 L 182 200 Z" fill="#A88538"/>

  <!-- Rungs + dots + labels, bottom (Braced) to top (Melted) -->
  <!-- Row spacing -->
  <!-- y positions: 720, 590, 460, 330, 220 -->

  <!-- Braced -->
  <line class="rung" x1="150" y1="720" x2="190" y2="720"/>
  <circle class="dot" cx="170" cy="720" r="11"/>
  <text class="label" x="230" y="712">BRACED</text>
  <text class="desc" x="230" y="742">Shoulders up. Breath shallow. Ready for intrusion.</text>

  <!-- Withheld -->
  <line class="rung" x1="150" y1="590" x2="190" y2="590"/>
  <circle class="dot" cx="170" cy="590" r="11"/>
  <text class="label" x="230" y="582">WITHHELD</text>
  <text class="desc" x="230" y="612">Pulled back. Present in the room, quietly gone.</text>

  <!-- Performing -->
  <line class="rung" x1="150" y1="460" x2="190" y2="460"/>
  <circle class="dot" cx="170" cy="460" r="11"/>
  <text class="label" x="230" y="452">PERFORMING</text>
  <text class="desc" x="230" y="482">Offering connection. Receiving none of it.</text>

  <!-- Present -->
  <line class="rung" x1="150" y1="330" x2="190" y2="330"/>
  <circle class="dot" cx="170" cy="330" r="11"/>
  <text class="label" x="230" y="322">PRESENT</text>
  <text class="desc" x="230" y="352">Attuned. Grounded. Nothing to manage.</text>

  <!-- Melted (home) -->
  <line class="rung-glow" x1="150" y1="220" x2="190" y2="220"/>
  <line class="rung" x1="150" y1="220" x2="190" y2="220"/>
  <circle class="dot dot-home" cx="170" cy="220" r="13"/>
  <text class="label label-home" x="230" y="212">MELTED</text>
  <text class="desc" x="230" y="242">Protection surrendered. Life reaches all the way in.</text>

  <!-- Gold triangle motif marking "home" above Melted -->
  <polygon class="tri" points="170,120 200,168 140,168"/>
  <polygon class="tri" points="170,142 186,168 154,168"/>

  <text x="320" y="820" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-style="italic" fill="#6b6b66">One rung at a time. That is the whole practice.</text>
  <text x="320" y="862" text-anchor="middle" class="kicker" font-size="13" letter-spacing="4">FEELFULLYYOU.COM</text>
</svg>
